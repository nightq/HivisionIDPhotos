name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 注意：模型不会打包进exe，首次运行时自动下载
      # 这里创建空的 weights 目录，确保目录结构正确
      - name: Prepare weights directory
        run: |
          if not exist "hivision\creator\weights" mkdir "hivision\creator\weights"
          type nul > hivision\creator\weights\.gitkeep

      - name: 下载模型（用于极速便携版）
        run: python scripts/download_model.py --models hivision_modnet

      - name: Build 单文件版 (Single EXE) - 模型自动下载
        run: pyinstaller app.spec

      - name: Build 便携版 (Portable Folder) - 模型自动下载
        run: pyinstaller app-portable.spec

      - name: Build 极速便携版 - 模型内置，启动最快 ⚡
        run: pyinstaller app-fast.spec

      - name: Prepare release packages
        shell: pwsh
        run: |
          # 创建通用说明文件
          $readme = @"
          ========================================
              HivisionIDPhotos - 证件照制作工具
          ========================================

          【使用方法】
          1. 双击 HivisionIDPhotos.exe 启动
          2. 等待浏览器自动打开（或手动访问 http://127.0.0.1:7860）
          3. 上传照片，选择尺寸和背景色
          4. 下载生成的证件照
          5. 关闭程序：直接关闭控制台窗口

          【版本说明】

          ⚡ 极速便携版（推荐）
             - 模型已内置，下载即用
             - 启动最快，约3秒启动
             - 可放U盘随身携带
             - 目录大小约 330MB

          📁 便携版（文件夹模式）
             - 首次运行自动下载模型
             - 启动较快
             - 可手动替换模型文件
             - 目录大小约 300MB（+25MB 模型）

          📦 单文件版
             - 只有一个 exe，分享方便
             - 首次运行自动下载模型
             - 每次启动需要解压，约10秒

          【常见问题】
          Q: 浏览器没有自动打开？
          A: 手动在浏览器访问 http://127.0.0.1:7860

          Q: 下载模型很慢？
          A: 可以手动下载放到 hivision/creator/weights/ 目录

          Q: 如何关闭程序？
          A: 直接关闭控制台（黑窗口）即可

          ========================================
          项目地址: https://github.com/Zeyi-Lin/HivisionIDPhotos
          ========================================
          "@

          # 单文件版
          New-Item -ItemType Directory -Path release-single -Force
          Copy-Item dist\HivisionIDPhotos.exe -Destination release-single\
          Copy-Item README.md -Destination release-single\
          Copy-Item LICENSE -Destination release-single\
          $readme | Out-File -FilePath release-single\使用说明.txt -Encoding utf8

          # 便携版（文件夹模式）
          Copy-Item dist\HivisionIDPhotos-portable -Destination release-portable -Recurse
          Copy-Item README.md -Destination release-portable\
          Copy-Item LICENSE -Destination release-portable\
          $readme | Out-File -FilePath release-portable\使用说明.txt -Encoding utf8

          # 极速便携版（模型内置）
          Copy-Item dist\HivisionIDPhotos-极速便携版 -Destination release-fast -Recurse
          Copy-Item README.md -Destination release-fast\
          Copy-Item LICENSE -Destination release-fast\
          ($readme -replace "⚡ 极速便携版（推荐）", "✅ 你正在使用极速便携版") | Out-File -FilePath release-fast\使用说明.txt -Encoding utf8

      - name: 上传 单文件版
        uses: actions/upload-artifact@v4
        with:
          name: HivisionIDPhotos-Windows-单文件版
          path: release-single/
          retention-days: 30

      - name: 上传 便携版
        uses: actions/upload-artifact@v4
        with:
          name: HivisionIDPhotos-Windows-便携版
          path: release-portable/
          retention-days: 30

      - name: 上传 极速便携版 ⭐
        uses: actions/upload-artifact@v4
        with:
          name: HivisionIDPhotos-Windows-极速便携版-推荐
          path: release-fast/
          retention-days: 30
